{% extends "base.html" %}

{% block title %}Faculty Upload | AI Grading System{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 620px; margin: 0 auto; width: 100%;">
  <h2 class="hero-title text-gradient" style="font-size: 2.5rem;">Faculty Upload</h2>
  <p class="hero-subtitle" style="margin-bottom: 2rem;">Upload the question paper and model answers PDF.</p>

  <form action="" method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label class="form-label">Number of Questions in the PDF</label>
      <input type="number" class="form-control" name="num_questions" required min="1" max="50" placeholder="e.g. 5">
    </div>

    <div class="form-group" style="margin-top: 1.5rem;">
      <label class="form-label">Upload Question Paper PDF</label>
      <input type="file" class="form-control" name="question_file" accept=".pdf,.png,.jpg,.jpeg">
    </div>

    <div class="form-group" style="margin-top: 1.5rem;">
      <label class="form-label">Upload Model Answers PDF <span style="color:var(--accent-red)">*</span></label>
      <input type="file" class="form-control" name="answer_file" required accept=".pdf,.png,.jpg,.jpeg">
    </div>

    <button type="submit" class="btn" style="margin-top: 2rem; width: 100%;">Upload &amp; Save</button>
  </form>
</div>
{% endblock %}
